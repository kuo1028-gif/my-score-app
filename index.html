<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>分數統計網頁</title>
    <style>
        /* 1. 設定整體的身體結構 */
        body { 
            font-family: sans-serif; 
            margin: 0;
            padding: 0;
            line-height: 1.6; 
            background-color: #ffffff; /* 確保左側是乾淨的純白底色 */
            
            /* 保留您的黑字需求：保持全黑字，完全不加陰影 */
            color: #000000;
        }

        /* 2. 右側 50% 的圖片容器 */
        .right-side-image {
            position: fixed;         /* 固定在螢幕上，不隨捲軸滾動 */
            top: 0;
            right: 0;                /* 固定在右側 */
            width: 50%;               /* 嚴格佔用螢幕的二分之一 */
            height: 100vh;           /* 高度撐滿整個螢幕 */
                        
            
            /* 👇 終極大絕招：直接換成最安全的 bg.png 檔名 👇 */
            background-image: url("bg.png"); 
            background-size: cover;                  /* 讓圖片完整鋪滿這 50% 區塊 */
            background-position: center center;      /* 置中對齊，完美呈現吉卜力房間 */
            background-repeat: no-repeat;            
        }

        /* 3. 左側 50% 的內容容器 */
        .content-container {
            width: 50%;               /* 左側也只佔用二分之一，與圖片並排 */
            min-height: 100vh;        /* 確保高度撐滿 */
            box-sizing: border-box;   /* 讓 padding 不會撐開寬度 */
            padding: 60px 40px;       /* 留出舒適的邊距 */
        }
        
        /* 讓輸入框與按鈕在左側區塊內更好看 */
        input[type="number"], button {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #bbb;
            background-color: #ffffff;
            color: #000000; 
        }
        
        input[type="number"] {
            width: 180px; /* 固定輸入框寬度 */
        }
        
        button {
            cursor: pointer;
            margin-left: 5px;
            font-weight: bold;
            background-color: #f5f5f5;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        #log { 
            margin-top: 20px; 
            border-top: 1px solid rgba(0, 0, 0, 0.1); /* 保持原本黑色的細分隔線 */
            padding-top: 10px; 
        }
    </style>
</head>
<body>

    <div class="right-side-image"></div>

    <div class="content-container">
        <h2>分數統計系統</h2>
        <input type="number" id="scoreInput" placeholder="請輸入分數">
        <button onclick="addScore()">輸入分數</button>
        <button onclick="endSession()">計算平均</button>

        <div id="log"></div>
    </div>

    <script>
        let totalScore = 0;
        let count = 0;
        const log = document.getElementById('log');

        function addScore() {
            const input = document.getElementById('scoreInput');
            const score = parseInt(input.value);

            if (isNaN(score) || score < 0 || score > 100) {
                log.innerHTML += `<p style="color:#ff4d4d; font-weight:bold;">亂輸入 抓到</p>`;
            } else {
                totalScore += score;
                count++;
                
                let isPass = score >= 60 ? "是" : "否";
                let comment = score >= 100 ? "真棒!繼續保持!" : 
                              score >= 80 ? "不錯!繼續努力!" : 
                              score >= 60 ? "還可以,繼續加油" : "繼續加油吧";
                
                log.innerHTML += `<p>分數: ${score} | 及格: ${isPass} | ${comment}</p>`;
            }
            input.value = ''; // 清空輸入框
        }

        function endSession() {
            if (count > 0) {
                let avg = (totalScore / count).toFixed(1);
                log.innerHTML += `<br><hr><strong> 統計結果: 共 ${count} 位，平均分數: ${avg} 分</strong>`;
            } else {
                log.innerHTML += `<p>沒有輸入 any 分數</p>`;
            }
        }
    </script>
</body>
</html>
