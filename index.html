<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>分數統計網頁</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0;
            padding: 0;
            line-height: 1.6; 
            color: #000000;
        }
        .bg-right {
            position: fixed;            
            top: 0;
            right: 0;                   
            width: 50%;                 
            height: 100vh;              
            z-index: -1;                
            background-image: url("bg.png"); 
            background-size: cover;                  
            background-position: center;             
            background-repeat: no-repeat;            
        }
        .container {
            width: 50%;               
            min-height: 100vh;        
            box-sizing: border-box;   
            padding: 40px;            
            background-color: rgba(255, 255, 255, 0.85); 
            border-right: 1px solid rgba(0, 0, 0, 0.1); 
        }
        input[type="number"], button {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #bbb;
            background-color: #ffffff;
            color: #000000; 
        }
        input[type="number"] {
            width: 180px;
        }
        button {
            cursor: pointer;
            margin-left: 5px;
            font-weight: bold;
            background-color: #f5f5f5;
        }
        button:hover {
            background-color: #e0e0e0;
        }
        #log { 
            margin-top: 20px; 
            border-top: 1px solid rgba(0, 0, 0, 0.2); 
            padding-top: 10px; 
        }
    </style>
</head>
<body>

    <div class="bg-right"></div>

    <div class="container">
        <h2>分數統計系統</h2>
        <input type="number" id="scoreInput" placeholder="請輸入分數">
        <button onclick="addScore()">輸入分數</button>
        <button onclick="endSession()">計算平均</button>
        <div id="log"></div>
    </div>

    <script>
        let totalScore = 0;
        let count = 0;

        function addScore() {
            const input = document.getElementById('scoreInput');
            const log = document.getElementById('log');
            const score = parseInt(input.value);

            if (isNaN(score) || score < 0 || score > 100) {
                log.innerHTML += `<p style="color:#ff4d4d; font-weight:bold;">亂輸入 抓到</p>`;
            } else {
                totalScore += score;
                count++;
                
                let isPass = score >= 60 ? "是" : "否";
                let comment = score >= 100 ? "真棒!繼續保持!" : 
                              score >= 80 ? "不錯!繼續努力!" : 
                              score >= 60 ? "還可以,繼續加油" : "繼續加油吧";
                
                log.innerHTML += `<p>分數: ${score} | 及格: ${isPass} | ${comment}</p>`;
            }
            input.value = ''; 
        }

        function endSession() {
            const log = document.getElementById('log');
            if (count > 0) {
                let avg = (totalScore / count).toFixed(1);
                log.innerHTML += `<br><hr><strong> 統計結果: 共 ${count} 位，平均分數: ${avg} 分</strong>`;
            } else {
                log.innerHTML += `<p>沒有輸入任何分數</p>`;
            }
        }
    </script>
</body>
</html>
